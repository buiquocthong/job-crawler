name: Vancouver Job Crawler

on:
  schedule:
    # 7:00 AM Vancouver time = 15:00 UTC (PST, UTC-8)
    # Mùa hè (PDT, UTC-7): đổi thành "0 14 * * *"
    - cron: "0 15 * * *"

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:
    inputs:
      demo_mode:
        description: "Chạy demo (không cần proxy/credentials)?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write   # Để commit CSV vào nhánh data

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run crawler ───────────────────────────────────────────────────
      - name: Run job crawler
        env:
          TEAMS_WEBHOOK_URL:            ${{ secrets.TEAMS_WEBHOOK_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID:       ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          JOB_PROXY:                    ${{ secrets.JOB_PROXY }}
          GITHUB_RUN_URL: >-
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event.inputs.demo_mode }}" = "true" ]; then
            python3 vancouver_job_crawler.py --demo
          else
            python3 vancouver_job_crawler.py
          fi

      # ── 5. Commit CSV vào nhánh data (backup) ────────────────────────────
      - name: Commit CSV to data branch
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Tạo nhánh data nếu chưa có
          git fetch origin data 2>/dev/null || true
          git checkout -B data origin/data 2>/dev/null || git checkout -b data

          # Copy CSV từ working dir của bước trước
          CSV_FILE=$(ls vancouver_jobs_*.csv 2>/dev/null | head -1)
          if [ -n "$CSV_FILE" ]; then
            git add "$CSV_FILE"
            git commit -m "chore: add $CSV_FILE [skip ci]" || echo "Nothing to commit"
            git push origin data --force
          else
            echo "Không tìm thấy file CSV — bỏ qua commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Upload CSV artifact (xem trực tiếp trong Actions UI) ──────────
      - name: Upload CSV as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vancouver-jobs-${{ github.run_id }}
          path: vancouver_jobs_*.csv
          retention-days: 30
